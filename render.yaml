services:
  - type: web
    name: filemind-backend-api
    env: python
    rootDir: packages/backend-python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port ${PORT:-8000}"
    envVars:
      - key: RENDER
        value: "true"
      - key: VERCEL
        value: "false"
      - key: APP_NAME
        value: "fileMind Production"
    autoDeploy: true
